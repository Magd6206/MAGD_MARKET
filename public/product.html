<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — MAGD MARKET</title>
  <link rel="stylesheet" href="css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand"><span class="brand-m">M</span>AGD<span class="brand-dot">.</span>MARKET</a>
      <button class="nav-hamburger" id="navHamburger"><span></span><span></span><span></span></button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn"><i class="fa fa-shopping-bag"></i><span class="cart-badge" id="cartBadge">0</span></a>
        <div class="nav-user-menu" id="navUserMenu">
          <button class="nav-icon-btn" id="userMenuBtn"><i class="fa fa-user-circle"></i></button>
          <div class="user-dropdown" id="userDropdown">
            <div id="guestLinks"><a href="login.html"><i class="fa fa-sign-in-alt"></i> Login</a><a href="signup.html"><i class="fa fa-user-plus"></i> Sign Up</a></div>
            <div id="authLinks" style="display:none">
              <a href="orders.html"><i class="fa fa-box"></i> My Orders</a>
              <a href="profile.html"><i class="fa fa-user"></i> Profile</a>
              <a href="#" id="adminLink" style="display:none"><i class="fa fa-shield-halved"></i> Admin Panel</a>
              <hr /><a href="#" id="logoutBtn"><i class="fa fa-sign-out-alt"></i> Logout</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="page-header">
    <div class="container">
      <h1 id="productBreadcrumbTitle">Product</h1>
      <nav class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <a href="shop.html">Shop</a> <span>/</span> <span id="breadcrumbName">...</span></nav>
    </div>
  </div>

  <!-- PRODUCT DETAIL -->
  <div class="container section" id="productDetailContainer">
    <!-- Loading skeleton -->
    <div class="product-detail-skeleton" id="productSkeleton">
      <div class="skel-img"></div>
      <div class="skel-info">
        <div class="skel-line skel-line--lg"></div>
        <div class="skel-line skel-line--md"></div>
        <div class="skel-line skel-line--sm"></div>
        <div class="skel-line skel-line--md"></div>
      </div>
    </div>

    <!-- Product content (hidden until loaded) -->
    <div class="product-detail" id="productDetail" style="display:none">
      <!-- Gallery -->
      <div class="product-gallery">
        <div class="gallery-main" id="galleryMain">
          <img src="" alt="Product" id="mainImage" class="gallery-main-img" />
          <div class="gallery-zoom-hint"><i class="fa fa-magnifying-glass-plus"></i></div>
        </div>
        <div class="gallery-thumbs" id="galleryThumbs"></div>
      </div>

      <!-- Info -->
      <div class="product-info">
        <div class="product-badges" id="productBadges"></div>
        <h1 class="product-title" id="productTitle"></h1>

        <div class="product-rating-row">
          <div class="stars-display" id="productStarsDisplay"></div>
          <span class="rating-score" id="productRatingScore"></span>
          <a href="#reviews" class="rating-link" id="reviewCountLink"></a>
        </div>

        <div class="product-price-row">
          <span class="product-price" id="productPrice"></span>
        </div>

        <p class="product-description" id="productDescription"></p>

        <!-- Size Selector -->
        <div class="variant-section">
          <div class="variant-label">
            <span>Size</span>
            <span class="variant-hint" id="sizeHint"></span>
          </div>
          <div class="size-selector" id="sizeSelector"></div>
        </div>

        <!-- Color Selector -->
        <div class="variant-section">
          <div class="variant-label">
            <span>Color</span>
            <span class="variant-hint" id="colorHint"></span>
          </div>
          <div class="color-selector" id="colorSelector"></div>
        </div>

        <!-- Stock Info -->
        <div class="stock-info" id="stockInfo"></div>

        <!-- Quantity -->
        <div class="quantity-section">
          <label class="variant-label">Quantity</label>
          <div class="quantity-control">
            <button class="qty-btn" id="qtyMinus">−</button>
            <input type="number" id="qtyInput" value="1" min="1" class="qty-input" readonly />
            <button class="qty-btn" id="qtyPlus">+</button>
          </div>
        </div>

        <!-- CTA Buttons -->
        <div class="product-actions">
          <button class="btn btn-accent btn-lg btn-full" id="addToCartBtn">
            <i class="fa fa-shopping-bag"></i> Add to Cart
          </button>
        </div>

        <!-- Meta -->
        <div class="product-meta" id="productMeta"></div>
      </div>
    </div>
  </div>

  <!-- REVIEWS SECTION -->
  <section class="reviews-section section container" id="reviews">
    <div class="section-header">
      <h2 class="section-title">Customer Reviews</h2>
    </div>

    <!-- Review Summary -->
    <div class="review-summary" id="reviewSummary">
      <div class="review-score-big" id="reviewScoreBig">
        <span class="score-number" id="scoreNumber">0</span>
        <div class="score-stars" id="scoreStars"></div>
        <span class="score-count" id="scoreCount">0 reviews</span>
      </div>
    </div>

    <!-- Add Review Form (auth required) -->
    <div class="add-review-card" id="addReviewCard">
      <h3>Write a Review</h3>
      <div class="star-picker" id="starPicker">
        <i class="fa fa-star star-pick" data-val="1"></i>
        <i class="fa fa-star star-pick" data-val="2"></i>
        <i class="fa fa-star star-pick" data-val="3"></i>
        <i class="fa fa-star star-pick" data-val="4"></i>
        <i class="fa fa-star star-pick" data-val="5"></i>
      </div>
      <textarea id="reviewComment" class="input-field review-textarea" placeholder="Share your thoughts about this product..."></textarea>
      <button class="btn btn-primary" id="submitReviewBtn">
        <i class="fa fa-paper-plane"></i> Submit Review
      </button>
      <p class="review-login-hint" id="reviewLoginHint" style="display:none">
        <a href="login.html">Login</a> to leave a review.
      </p>
    </div>

    <!-- Reviews List -->
    <div class="reviews-list" id="reviewsList">
      <div class="reviews-loading"><i class="fa fa-spinner fa-spin"></i> Loading reviews...</div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom"><p>&copy; 2026 MAGD MARKET. All rights reserved.</p></div>
    </div>
  </footer>

  <!-- Image Lightbox -->
  <div class="lightbox" id="lightbox" style="display:none">
    <button class="lightbox-close" id="lightboxClose"><i class="fa fa-times"></i></button>
    <img src="" alt="Zoom" id="lightboxImg" />
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
