<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — MAGD MARKET</title>
  <link rel="stylesheet" href="css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand"><span class="brand-m">M</span>AGD<span class="brand-dot">.</span>MARKET</a>
      <button class="nav-hamburger" id="navHamburger"><span></span><span></span><span></span></button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn"><i class="fa fa-shopping-bag"></i><span class="cart-badge" id="cartBadge">0</span></a>
        <div class="nav-user-menu" id="navUserMenu">
          <button class="nav-icon-btn" id="userMenuBtn"><i class="fa fa-user-circle"></i></button>
          <div class="user-dropdown" id="userDropdown">
            <div id="guestLinks"><a href="login.html"><i class="fa fa-sign-in-alt"></i> Login</a><a href="signup.html"><i class="fa fa-user-plus"></i> Sign Up</a></div>
            <div id="authLinks" style="display:none">
              <a href="orders.html"><i class="fa fa-box"></i> My Orders</a>
              <a href="profile.html"><i class="fa fa-user"></i> Profile</a>
              <a href="#" id="adminLink" style="display:none"><i class="fa fa-shield-halved"></i> Admin Panel</a>
              <hr /><a href="#" id="logoutBtn"><i class="fa fa-sign-out-alt"></i> Logout</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>My Profile</h1>
      <nav class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <span>Profile</span></nav>
    </div>
  </div>

  <div class="auth-required-msg container section" id="authRequiredMsg" style="display:none">
    <div class="empty-state"><i class="fa fa-lock"></i><h3>Login Required</h3><a href="login.html" class="btn btn-primary">Login Now</a></div>
  </div>

  <div class="container section" id="profileContent" style="display:none">
    <div class="profile-layout">
      <!-- Avatar / sidebar -->
      <div class="profile-sidebar">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profileAvatar">
            <i class="fa fa-user-circle"></i>
          </div>
          <h3 id="profileName">...</h3>
          <span class="profile-email" id="profileEmail">...</span>
        </div>
        <nav class="profile-nav">
          <a href="profile.html" class="active"><i class="fa fa-user"></i> Profile</a>
          <a href="orders.html"><i class="fa fa-box"></i> My Orders</a>
          <a href="cart.html"><i class="fa fa-shopping-bag"></i> Cart</a>
        </nav>
      </div>

      <!-- Edit form -->
      <div class="profile-main">
        <div class="profile-card">
          <div class="profile-card-header">
            <h3>Account Details</h3>
            <button class="btn btn-outline btn-sm" id="editToggleBtn"><i class="fa fa-edit"></i> Edit</button>
          </div>

          <div class="alert alert-success" id="profileSuccess" style="display:none"></div>
          <div class="alert alert-error" id="profileError" style="display:none"></div>

          <form id="profileForm" novalidate>
            <div class="profile-fields-grid">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="pfName" class="input-field" disabled />
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="pfEmail" class="input-field" disabled />
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" id="pfPhone" class="input-field" disabled />
              </div>
              <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" id="pfAddress" class="input-field" disabled />
              </div>
            </div>

            <div class="profile-form-actions" id="profileFormActions" style="display:none">
              <button type="submit" class="btn btn-primary" id="saveProfileBtn">
                <i class="fa fa-save"></i> Save Changes
              </button>
              <button type="button" class="btn btn-ghost" id="cancelEditBtn">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container"><div class="footer-bottom"><p>&copy; 2026 MAGD MARKET. All rights reserved.</p></div></div>
  </footer>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
