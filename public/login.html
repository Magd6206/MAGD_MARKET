<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MAGD MARKET</title>
  <link rel="stylesheet" href="css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="auth-page">
  <div class="auth-layout">
    <!-- Left Brand Panel -->
    <div class="auth-brand-panel">
      <a href="index.html" class="nav-brand auth-brand-logo"><span class="brand-m">M</span>AGD<span class="brand-dot">.</span>MARKET</a>
      <div class="auth-brand-content">
        <h2>Welcome Back</h2>
        <p>Log in to continue shopping the latest clothing & footwear collections.</p>
        <div class="auth-brand-features">
          <div class="auth-feat"><i class="fa fa-check-circle"></i><span>Track your orders in real-time</span></div>
          <div class="auth-feat"><i class="fa fa-check-circle"></i><span>Save items to your cart</span></div>
          <div class="auth-feat"><i class="fa fa-check-circle"></i><span>Exclusive coupon access</span></div>
        </div>
      </div>
      <div class="auth-brand-shapes">
        <div class="auth-shape auth-shape-1"></div>
        <div class="auth-shape auth-shape-2"></div>
      </div>
    </div>

    <!-- Form Panel -->
    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <h1 class="auth-form-title">Sign In</h1>
        <p class="auth-form-sub">Don't have an account? <a href="signup.html">Create one</a></p>

        <div class="alert alert-error" id="loginError" style="display:none"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fa fa-envelope input-icon"></i>
              <input type="email" id="loginEmail" class="input-field input-with-icon" placeholder="your@email.com" required autocomplete="email" />
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
              <i class="fa fa-lock input-icon"></i>
              <input type="password" id="loginPassword" class="input-field input-with-icon" placeholder="Your password" required autocomplete="current-password" />
              <button type="button" class="input-icon-right toggle-pw" id="togglePw" aria-label="Show password">
                <i class="fa fa-eye"></i>
              </button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
            <span id="loginBtnText">Sign In</span>
            <span id="loginSpinner" style="display:none"><i class="fa fa-spinner fa-spin"></i> Signing in...</span>
          </button>
        </form>

        <p class="auth-alt-link">Back to <a href="index.html">Home</a></p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
